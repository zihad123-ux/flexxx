<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Poll Auth</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Campus Poll System</h2>

<div id="authBox">
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div style="margin-bottom:20px;">
  <button onclick="adminMode()">Admin Panel</button>
</div>

<div id="adminBox" style="display:none">
  <textarea id="postText" placeholder="Write post"></textarea>
  <button onclick="addPost()">Post</button>
</div>

<div id="posts" style="display:none"></div>

<div id="adminMsgBox" style="display:none">
  <h3>Messages from Users</h3>
  <div id="adminMessages"></div>
</div>

<div id="messageBox" style="display:none">
  <textarea id="msgText" placeholder="Send message to admin"></textarea>
  <button onclick="sendMsg()">Send Message</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="script.js"></script>

</body>
</html>
